<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Game - Sticking Arrows</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .game-wrapper {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        canvas {
            display: block;
            width: 1000px;
            height: 400px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            cursor: crosshair;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 30%, #B0E0E6 70%, #C0E8D5 100%);
        }

        .instruction {
            color: #ccc;
            text-align: center;
            margin-top: 15px;
            font-size: 16px;
        }

        .instruction span {
            display: inline-block;
            background: #333;
            padding: 5px 15px;
            border-radius: 20px;
            color: #88ce02;
        }

        .arrow-counter {
            position: absolute;
            top: 40px;
            right: 40px;
            color: white;
            font-size: 18px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid #88ce02;
            z-index: 10;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .replay-btn {
            position: absolute;
            bottom: 80px;
            right: 40px;
            background: linear-gradient(135deg, #88ce02, #6aa302);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(136, 206, 2, 0.4);
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .replay-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #9ae010, #7cb806);
            box-shadow: 0 6px 20px rgba(136, 206, 2, 0.6);
        }

        .replay-btn:active {
            transform: scale(0.95);
        }

        .replay-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .stats-container {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .stat-box {
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 10px 20px;
            color: white;
            border: 2px solid #88ce02;
            backdrop-filter: blur(5px);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-box span {
            color: #88ce02;
            font-weight: bold;
            font-size: 20px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="stats-container">
            <div class="stat-box">
                🏹 Score: <span id="scoreDisplay">0</span>
            </div>
            <div class="stat-box">
                🎯 Accuracy: <span id="accuracyDisplay">0%</span>
            </div>
        </div>
        <div class="arrow-counter" id="arrowCounter">
            📍 Stuck: 0/3
        </div>
        
        <button class="replay-btn" id="replayBtn">
            <svg viewBox="0 0 24 24">
                <path d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/>
            </svg>
            REPLAY
        </button>
        
        <canvas id="gameCanvas" width="1000" height="400"></canvas>
        <div class="instruction">
            <span>⬇️ Click and drag to pull back • Release to shoot ⬇️</span>
        </div>
    </div>

    <script>
        // Get canvas and context
        // Make canvas fill the screen
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const arrowCounter = document.getElementById('arrowCounter');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const accuracyDisplay = document.getElementById('accuracyDisplay');
        const replayBtn = document.getElementById('replayBtn');
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        // Game state
        let isDragging = false;
        let pullDistance = 0;
        let arrowAngle = 0;
        let arrows = [];
        let stuckArrows = [];
        let maxStuckArrows = 3;
        let score = 0;
        let totalShots = 0;
        let hits = 0;
        let message = '';
        let messageTimer = 0;
        let mouseX = 0, mouseY = 0;

        // Slow motion flag
        let showSlowMotion = false;
        let slowMotionTimer = 0;

        // Game objects positions
        const bow = { x: 120, y: 200 };
        const target = { x: 850, y: 200 };

        // Replay function
        function resetGame() {
            // Clear all arrays
            arrows = [];
            stuckArrows = [];
            
            // Reset counters
            score = 0;
            totalShots = 0;
            hits = 0;
            
            // Reset UI
            updateStats();
            arrowCounter.textContent = `📍 Stuck: 0/${maxStuckArrows}`;
            
            // Reset slow motion
            showSlowMotion = false;
            slowMotionTimer = 0;
            
            // Show reset message
            message = 'GAME RESET! ↩️';
            messageTimer = 45;
        }

        // Update stats display
        function updateStats() {
            scoreDisplay.textContent = score;
            const accuracy = totalShots > 0 ? Math.round((hits / totalShots) * 100) : 0;
            accuracyDisplay.textContent = accuracy + '%';
        }

        // Replay button event listener
        replayBtn.addEventListener('click', resetGame);

        // Mouse event handling
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            updateMousePosition(e);
        });

        canvas.addEventListener('mousemove', (e) => {
            updateMousePosition(e);
            if (isDragging) {
                calculatePull();
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (isDragging && pullDistance > 5) {
                shootArrow();
            }
            isDragging = false;
            pullDistance = 0;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            pullDistance = 0;
        });

        function updateMousePosition(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
        }

        function calculatePull() {
            const dx = mouseX - bow.x;
            const dy = mouseY - bow.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            pullDistance = Math.min(distance, 100);
            arrowAngle = Math.atan2(dy, dx);
        }

        function shootArrow() {
            totalShots++;
            const randomError = (Math.random() - 0.5) * 0.08;
            
            // Create new arrow with slow motion flag
            const newArrow = {
                x: bow.x,
                y: bow.y,
                angle: arrowAngle + randomError,
                power: pullDistance,
                distance: 0,
                active: true,
                stuck: false,
                slowMotion: showSlowMotion,
                stuckIndex: -1
            };
            
            arrows.push(newArrow);
            
            // If we just hit a target, show next arrow in slow motion
            if (showSlowMotion) {
                slowMotionTimer = 120;
            }
            
            updateStats();
        }

        function updateArrows() {
            for (let i = arrows.length - 1; i >= 0; i--) {
                const arrow = arrows[i];
                
                if (!arrow.active || arrow.stuck) continue;
                
                // Apply slow motion if flag is active
                let speedMultiplier = 1;
                if (arrow.slowMotion) {
                    speedMultiplier = 0.3;
                }
                
                const speed = arrow.power * 0.8 * speedMultiplier;
                arrow.distance += speed;
                
                const maxDistance = 800;
                const t = arrow.distance / maxDistance;
                
                if (t > 1) {
                    arrow.active = false;
                    if (!arrow.stuck) {
                        message = 'MISS!';
                        messageTimer = 30;
                    }
                    updateStats();
                    continue;
                }
                
                arrow.x = bow.x + 750 * t;
                arrow.y = bow.y - 120 * Math.sin(t * Math.PI) + t * 30;
                
                arrow.angle = Math.atan2(
                    -120 * Math.PI * Math.cos(t * Math.PI) / maxDistance + 30 / maxDistance,
                    750 / maxDistance
                );
                
                // Check hit
                const tipX = arrow.x + Math.cos(arrow.angle) * 40;
                const tipY = arrow.y + Math.sin(arrow.angle) * 40;
                
                const dx = tipX - target.x;
                const dy = tipY - target.y;
                const distToTarget = Math.sqrt(dx * dx + dy * dy);
                
                // Check if arrow hit the target
                if (distToTarget < 45 && arrow.active && !arrow.stuck) {
                    // Check if we have room for more stuck arrows
                    if (stuckArrows.length < maxStuckArrows) {
                        // Mark arrow as stuck
                        arrow.active = false;
                        arrow.stuck = true;
                        hits++;
                        
                        // Calculate stuck position on target
                        const angleToTarget = Math.atan2(dy, dx);
                        const stickDistance = distToTarget;
                        
                        // Store stuck arrow with its position
                        stuckArrows.push({
                            x: tipX,
                            y: tipY,
                            angle: arrow.angle,
                            power: arrow.power,
                            hitTime: Date.now()
                        });
                        
                        // Update counter
                        arrowCounter.textContent = `📍 Stuck: ${stuckArrows.length}/${maxStuckArrows}`;
                        
                        // Show message based on accuracy
                        if (distToTarget < 15) {
                            score += 50;
                            message = 'PERFECT! 🎯';
                        } else if (distToTarget < 30) {
                            score += 30;
                            message = 'GREAT! 👍';
                        } else {
                            score += 10;
                            message = 'HIT! ✓';
                        }
                        messageTimer = 45;
                        
                        // Enable slow motion for next arrow
                        showSlowMotion = true;
                        
                        // If we've reached max stuck arrows, show completion message
                        if (stuckArrows.length === maxStuckArrows) {
                            message = 'MAX ARROWS! 🏆';
                            messageTimer = 60;
                            showSlowMotion = false;
                        }
                    } else {
                        // Target is full - arrow bounces off
                        arrow.active = false;
                        message = 'TARGET FULL!';
                        messageTimer = 30;
                    }
                    
                    updateStats();
                }
            }
            
            // Remove arrows that are not active and not stuck
            arrows = arrows.filter(a => a.active || a.stuck);
            
            // Update slow motion timer
            if (slowMotionTimer > 0) {
                slowMotionTimer--;
                if (slowMotionTimer === 0) {
                    showSlowMotion = false;
                }
            }
        }

        // Drawing functions
        function drawGround() {
            ctx.fillStyle = '#2e7d32';
            ctx.fillRect(0, 250, canvas.width, 150);
            
            ctx.strokeStyle = '#1b5e20';
            ctx.lineWidth = 1;
            for (let i = 0; i < 50; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 30, 250);
                ctx.lineTo(i * 30 + 20, 280);
                ctx.stroke();
            }
        }

        function drawSky() {
            // Sun
            ctx.beginPath();
            ctx.arc(900, 70, 40, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd700';
            ctx.fill();
            
            // Sun rays
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 3;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const x1 = 900 + Math.cos(angle) * 50;
                const y1 = 70 + Math.sin(angle) * 50;
                const x2 = 900 + Math.cos(angle) * 70;
                const y2 = 70 + Math.sin(angle) * 70;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            
            // Clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(200, 50, 25, 0, Math.PI * 2);
            ctx.arc(230, 50, 30, 0, Math.PI * 2);
            ctx.arc(260, 50, 25, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawTarget() {
            // Draw target stand
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(target.x - 15, target.y + 30, 30, 60);
            
            // Draw target rings
            const rings = [
                { radius: 45, color: '#FFFFFF' },
                { radius: 35, color: '#F4531C' },
                { radius: 25, color: '#FFFFFF' },
                { radius: 15, color: '#F4531C' },
                { radius: 7, color: '#FFD700' }
            ];
            
            for (let ring of rings) {
                ctx.beginPath();
                ctx.arc(target.x, target.y, ring.radius, 0, Math.PI * 2);
                ctx.fillStyle = ring.color;
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            // Draw hit marks where arrows are stuck
            for (let arrow of stuckArrows) {
                ctx.beginPath();
                ctx.arc(arrow.x, arrow.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#8b0000';
                ctx.fill();
                ctx.strokeStyle = '#ff4444';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function drawBow() {
            // Draw bow body
            ctx.beginPath();
            ctx.moveTo(bow.x, bow.y - 40);
            ctx.quadraticCurveTo(bow.x - 40, bow.y, bow.x, bow.y + 40);
            ctx.strokeStyle = '#88ce02';
            ctx.lineWidth = 8;
            ctx.stroke();
            
            // Draw bow string
            ctx.beginPath();
            ctx.moveTo(bow.x, bow.y - 40);
            
            if (isDragging && pullDistance > 0) {
                const pullX = bow.x - pullDistance * 0.6;
                const pullY = bow.y;
                ctx.quadraticCurveTo(pullX, pullY, bow.x, bow.y + 40);
                
                // Draw nocked arrow
                ctx.save();
                ctx.translate(pullX, pullY);
                ctx.rotate(arrowAngle);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(50, 0);
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(50, 0);
                ctx.lineTo(42, -4);
                ctx.lineTo(42, 4);
                ctx.closePath();
                ctx.fillStyle = '#888';
                ctx.fill();
                
                ctx.fillStyle = '#88ce02';
                ctx.beginPath();
                ctx.moveTo(10, 0);
                ctx.lineTo(0, -5);
                ctx.lineTo(0, 5);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
                
                // Draw power indicator
                const powerPercent = (pullDistance / 100) * 100;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(20, 350, 200, 20);
                
                const gradient = ctx.createLinearGradient(20, 0, 220, 0);
                gradient.addColorStop(0, '#88ce02');
                gradient.addColorStop(1, '#ffcc00');
                ctx.fillStyle = gradient;
                ctx.fillRect(20, 350, powerPercent * 2, 20);
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(20, 350, 200, 20);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.fillText(`POWER: ${Math.round(powerPercent)}%`, 20, 345);
            } else {
                ctx.quadraticCurveTo(bow.x - 15, bow.y, bow.x, bow.y + 40);
            }
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawArrows() {
            // Draw stuck arrows first
            for (let arrow of stuckArrows) {
                ctx.save();
                ctx.translate(arrow.x, arrow.y);
                ctx.rotate(arrow.angle);
                
                // Draw arrow shaft with slight transparency for stuck arrows
                ctx.beginPath();
                ctx.moveTo(-10, 0);
                ctx.lineTo(30, 0);
                ctx.strokeStyle = 'rgba(136, 136, 136, 0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Draw fletching
                ctx.fillStyle = 'rgba(136, 206, 2, 0.8)';
                ctx.beginPath();
                ctx.moveTo(-2, 0);
                ctx.lineTo(-12, -4);
                ctx.lineTo(-12, 4);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
            
            // Draw active arrows
            for (let arrow of arrows) {
                if (!arrow.active) continue;
                
                ctx.save();
                ctx.translate(arrow.x, arrow.y);
                ctx.rotate(arrow.angle);
                
                // Draw arrow shaft
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(40, 0);
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Draw arrow head
                ctx.beginPath();
                ctx.moveTo(40, 0);
                ctx.lineTo(34, -3);
                ctx.lineTo(34, 3);
                ctx.closePath();
                ctx.fillStyle = '#888';
                ctx.fill();
                
                // Draw fletching
                ctx.fillStyle = '#88ce02';
                ctx.beginPath();
                ctx.moveTo(8, 0);
                ctx.lineTo(0, -4);
                ctx.lineTo(0, 4);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
        }

        function drawUI() {
            // Slow motion indicator
            if (showSlowMotion) {
                ctx.fillStyle = '#88ce02';
                ctx.font = 'bold 20px Arial';
                ctx.shadowColor = '#88ce02';
                ctx.shadowBlur = 10;
                ctx.fillText('🐢 SLOW MOTION - Next arrow', 20, 150);
            }
            
            // Message
            if (messageTimer > 0) {
                messageTimer--;
                
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 15;
                
                if (message.includes('PERFECT')) {
                    ctx.shadowColor = '#FFD700';
                    ctx.fillStyle = '#FFD700';
                } else if (message.includes('GREAT')) {
                    ctx.shadowColor = '#F4531C';
                    ctx.fillStyle = '#F4531C';
                } else if (message.includes('HIT')) {
                    ctx.shadowColor = '#88ce02';
                    ctx.fillStyle = '#88ce02';
                } else if (message.includes('MAX')) {
                    ctx.shadowColor = '#FFD700';
                    ctx.fillStyle = '#FFD700';
                } else if (message.includes('RESET')) {
                    ctx.shadowColor = '#88ce02';
                    ctx.fillStyle = '#88ce02';
                } else {
                    ctx.shadowColor = '#aaa';
                    ctx.fillStyle = '#aaa';
                }
                
                ctx.fillText(message, canvas.width / 2, 120);
            }
            
            ctx.shadowBlur = 0;
            ctx.textAlign = 'left';
        }

        function drawTrajectory() {
            if (!isDragging || pullDistance < 5) return;
            
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([5, 5]);
            
            for (let t = 0.1; t <= 1; t += 0.1) {
                const x = bow.x + 750 * t;
                const y = bow.y - 120 * Math.sin(t * Math.PI) + t * 30;
                
                if (t === 0.1) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
                
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();
            }
            
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Keyboard reset (R key)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                resetGame();
            }
        });

        // Game loop
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawSky();
            drawGround();
            drawTarget();
            drawBow();
            drawTrajectory();
            updateArrows();
            drawArrows();
            drawUI();
            
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
